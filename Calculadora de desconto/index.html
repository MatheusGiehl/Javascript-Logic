<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora</title>
    <meta name="description" content="Basic HTML5 document for Logic course" />
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <header>
        <h1>Calculadora</h1>
    </header>

    <main>
        <div class="card">
            <label for="valorCompra">Valor da compra</label>
            <input type="number" id="valorCompra" name="valorCompra" placeholder="Digite o valor da compra" step="0.01" min="0" />

            <label for="porcentagem">Porcentagem de desconto</label>
            <input type="number" id="porcentagem" name="porcentagem" placeholder="Digite a porcentagem" step="0.1" min="0" max="100" />

            <div class="resultado">
                <p>Valor do desconto: <strong id="resultadoDesconto">R$ 0,00</strong></p>
                <p>Valor final: <strong id="resultadoFinal">R$ 0,00</strong></p>
            </div>
        </div>
    </main>
    <script src="script.js" defer></script>
</body>
</html>
