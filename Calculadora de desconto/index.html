<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora</title>
    <meta name="description" content="Basic HTML5 document for Logic course" />
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <main>
        <h1>Calculadora</h1>
        <div class="card">
            <label for="valorCompra">Valor da compra</label>
            <input type="number" id="valorCompra" name="valorCompra" placeholder="Digite o valor da compra" step="0.01" min="0" />

            <p class="info">Se o valor for maior que R$ 100,00, o desconto será 10%. A partir de R$ 200,00, o desconto será 20%.</p>

            <div class="resultado">
                <p>Desconto aplicado: <strong id="resultadoPorcentagem">0%</strong></p>
                <p>Valor do desconto: <strong id="resultadoDesconto">R$ 0,00</strong></p>
                <p>Valor final: <strong id="resultadoFinal">R$ 0,00</strong></p>
            </div>
        </div>
    </main>
    <script src="script.js" defer></script>
</body>
</html>
